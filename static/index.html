<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilingual Voice Support</title>
    <!-- Outfit Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b14;
            --card-bg: rgba(22, 22, 38, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --secondary: #00f5ff;
            --text-color: #f1f1f7;
            --text-muted: #8c8da3;
            --accent-en: #4facfe;
            --accent-hi: #ff9933;
            --accent-ar: #00e676;
            --radius: 16px;
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            padding: 36px;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #a18cd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .detector-badge-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .badge.en {
            color: var(--accent-en);
            background: rgba(79, 172, 254, 0.1);
            border-color: rgba(79, 172, 254, 0.25);
        }

        .badge.hi {
            color: var(--accent-hi);
            background: rgba(255, 153, 51, 0.1);
            border-color: rgba(255, 153, 51, 0.25);
        }

        .badge.ar {
            color: var(--accent-ar);
            background: rgba(0, 230, 118, 0.1);
            border-color: rgba(0, 230, 118, 0.25);
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s ease;
        }

        .badge.en .dot { background-color: var(--accent-en); }
        .badge.hi .dot { background-color: var(--accent-hi); }
        .badge.ar .dot { background-color: var(--accent-ar); }

        .input-group {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 16px;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(0, 0, 0, 0.35);
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border-radius: var(--radius);
            font-family: var(--font-family);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #630dd0 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Error banner */
        .error-banner {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.25);
            color: #ff8a80;
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* Waveform visualizer container */
        .visualizer-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .visualizer-card.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .visualizer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visualizer-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .audio-details {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .waveform-container {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--secondary);
            color: #0b0b14;
            box-shadow: 0 4px 15px rgba(0, 245, 255, 0.3);
        }

        .btn-circle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 245, 255, 0.5);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <!-- LiveKit Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Trilingual Voice Support</h1>
            <p class="subtitle">Voice synthesis for English, Hindi, and Arabic</p>
        </header>

        <div class="detector-badge-wrapper">
            <div id="lang-badge" class="badge">
                <div class="dot"></div>
                <span id="lang-text">Detecting Language</span>
            </div>
        </div>

        <div id="error-box" class="error-banner">
            <strong>Error:</strong> <span id="error-message"></span>
        </div>

        <div class="input-group">
            <textarea id="text-input" placeholder="Type customer support request in English, Hindi (नमस्ते), or Arabic (مرحباً)..."></textarea>
        </div>

        <div class="btn-container">
            <button id="clear-btn" class="btn-secondary">Clear</button>
            <button id="synthesize-btn" class="btn-primary">
                <span class="spinner"></span>
                <span class="btn-text">Generate Speech</span>
            </button>
        </div>

        <!-- Waveform player card -->
        <div id="visualizer-card" class="visualizer-card">
            <div class="visualizer-header">
                <span class="visualizer-title">Audio Output</span>
                <div class="audio-details">
                    <span id="detail-lang">Language: en_us</span>
                    <span id="detail-duration">Room: --</span>
                </div>
            </div>

            <div class="waveform-container">
                <canvas id="visualizer-canvas"></canvas>
            </div>

            <div class="control-row">
                <button id="play-btn" class="btn-circle">
                    <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Global error handlers
        window.addEventListener('error', (event) => {
            console.error("Uncaught error:", event.error);
            const msg = event.message || (event.error ? event.error.message : "An unknown error occurred.");
            showError(msg);
            resetSynthesizeBtn();
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error("Unhandled promise rejection:", event.reason);
            const msg = (event.reason && event.reason.message) ? event.reason.message : "Unhandled promise rejection.";
            showError(msg);
            resetSynthesizeBtn();
        });

        const textInput = document.getElementById('text-input');
        const langBadge = document.getElementById('lang-badge');
        const langText = document.getElementById('lang-text');
        const synthesizeBtn = document.getElementById('synthesize-btn');
        const clearBtn = document.getElementById('clear-btn');
        const errorBox = document.getElementById('error-box');
        const errorMessage = document.getElementById('error-message');
        
        const visualizerCard = document.getElementById('visualizer-card');
        const detailLang = document.getElementById('detail-lang');
        const detailDuration = document.getElementById('detail-duration');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const canvas = document.getElementById('visualizer-canvas');
        const canvasCtx = canvas.getContext('2d');

        // Language script detector
        function detectLanguageCode(text) {
            let counts = { en: 0, hi: 0, ar: 0 };
            for (let i = 0; i < text.length; i++) {
                let cp = text.charCodeAt(i);
                if (cp >= 0x0900 && cp <= 0x097F) {
                    counts.hi++;
                } else if (cp >= 0x0600 && cp <= 0x06FF) {
                    counts.ar++;
                } else if ((cp >= 65 && cp <= 90) || (cp >= 97 && cp <= 122)) {
                    counts.en++;
                }
            }
            
            let maxLang = 'en';
            let maxCount = counts.en;
            if (counts.hi > maxCount) { maxLang = 'hi'; maxCount = counts.hi; }
            if (counts.ar > maxCount) { maxLang = 'ar'; maxCount = counts.ar; }
            
            if (maxCount === 0) return 'detecting';
            return maxLang;
        }

        // Live script detector update
        textInput.addEventListener('input', () => {
            const val = textInput.value;
            const lang = detectLanguageCode(val);
            
            langBadge.className = 'badge';
            if (lang === 'detecting') {
                langText.textContent = 'Detecting Language';
            } else if (lang === 'en') {
                langBadge.classList.add('en');
                langText.textContent = 'English (US)';
            } else if (lang === 'hi') {
                langBadge.classList.add('hi');
                langText.textContent = 'Hindi (IN)';
            } else if (lang === 'ar') {
                langBadge.classList.add('ar');
                langText.textContent = 'Arabic (EG)';
            }
        });

        // Clear button handler
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            textInput.dispatchEvent(new Event('input'));
            errorBox.style.display = 'none';
        });

        // Web Audio API state
        let audioContext = null;
        let analyser = null;
        let gainNode = null;
        let isPlaying = false;
        let animationId = null;
        let currentRoom = null;

        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
            canvasCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawFlatLine() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            canvasCtx.clearRect(0, 0, width, height);
            canvasCtx.lineWidth = 2.5;
            canvasCtx.strokeStyle = '#4e4e6a';
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, height / 2);
            canvasCtx.lineTo(width, height / 2);
            canvasCtx.stroke();
        }
        drawFlatLine();

        function drawVisualizer() {
            if (!analyser || !isPlaying) {
                drawFlatLine();
                return;
            }

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const draw = () => {
                if (!isPlaying) return;
                animationId = requestAnimationFrame(draw);

                analyser.getByteTimeDomainData(dataArray);

                canvasCtx.fillStyle = 'rgba(11, 11, 20, 0.35)';
                canvasCtx.fillRect(0, 0, width, height);
                canvasCtx.lineWidth = 2.5;
                
                const lang = detectLanguageCode(textInput.value);
                let strokeColor = '#8a2be2';
                if (lang === 'en') strokeColor = '#4facfe';
                else if (lang === 'hi') strokeColor = '#ff9933';
                else if (lang === 'ar') strokeColor = '#00e676';
                
                canvasCtx.strokeStyle = strokeColor;
                canvasCtx.beginPath();

                const sliceWidth = width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = (v * height) / 2;

                    if (i === 0) {
                        canvasCtx.moveTo(x, y);
                    } else {
                        canvasCtx.lineTo(x, y);
                    }
                    x += sliceWidth;
                }

                canvasCtx.lineTo(width, height / 2);
                canvasCtx.stroke();
            };

            draw();
        }

        // Synthesize request
        synthesizeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                showError("Please enter some text before generating speech.");
                return;
            }

            errorBox.style.display = 'none';
            synthesizeBtn.classList.add('loading');
            synthesizeBtn.disabled = true;

            stopAudio();

            let data;
            try {
                const response = await fetch('/api/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    let errMsg = "Speech generation failed.";
                    try {
                        const errDetail = await response.json();
                        errMsg = errDetail.detail || errMsg;
                    } catch (e) {}
                    throw new Error(errMsg);
                }

                data = await response.json();

                // LiveKit port check
                const testHttpUrl = data.url.replace(/^ws/, 'http');
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 1500);
                    await fetch(testHttpUrl, { mode: 'no-cors', signal: controller.signal });
                    clearTimeout(timeoutId);
                } catch (connErr) {
                    throw new Error("LiveKit Server is offline. Please start 'livekit-server --dev'.");
                }

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const room = new LivekitClient.Room();
                currentRoom = room;

                let isTrackHandled = false;
                let trackSubscribedResolve;
                const trackSubscribedPromise = new Promise((resolve) => {
                    trackSubscribedResolve = resolve;
                });

                function handleAudioTrack(track) {
                    if (track.kind !== "audio" || isTrackHandled) return;
                    isTrackHandled = true;
                    
                    const oldAudio = document.getElementById("livekit-audio");
                    if (oldAudio) oldAudio.remove();

                    const audioElement = track.attach();
                    audioElement.id = "livekit-audio";
                    audioElement.muted = false;
                    document.body.appendChild(audioElement);
                    audioElement.play().catch(e => console.log("Audio play error:", e));
                    
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.001;
                    
                    const mediaStream = new MediaStream([track.mediaStreamTrack]);
                    const source = audioContext.createMediaStreamSource(mediaStream);
                    source.connect(analyser);
                    analyser.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    const lang = detectLanguageCode(text);
                    detailLang.textContent = `Language: ${lang === 'en' ? 'en_us' : lang === 'hi' ? 'hi_in' : 'ar_eg'}`;
                    detailDuration.textContent = `Room: ${data.room}`;
                    
                    visualizerCard.classList.add('active');
                    isPlaying = true;
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';

                    drawVisualizer();

                    if (trackSubscribedResolve) trackSubscribedResolve();
                }

                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === "audio") handleAudioTrack(track);
                });

                room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
                    if (track.kind === "audio") {
                        track.detach();
                        stopAudio('completed');
                    }
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    stopAudio('completed');
                });

                const connectPromise = room.connect(data.url, data.token);
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("Connection to LiveKit room timed out.")), 15000)
                );
                await Promise.race([connectPromise, timeoutPromise]);

                for (const participant of room.remoteParticipants.values()) {
                    for (const publication of participant.trackPublications.values()) {
                        if (publication.track && publication.track.kind === "audio") {
                            handleAudioTrack(publication.track);
                        }
                    }
                }

                const subscriptionTimeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("Timeout waiting for audio stream from server.")), 20000)
                );
                await Promise.race([trackSubscribedPromise, subscriptionTimeoutPromise]);

                resetSynthesizeBtn();

            } catch (err) {
                console.error(err);
                showError(err.message || "Failed to establish WebRTC connection.");
                resetSynthesizeBtn();
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.style.display = 'flex';
        }

        function resetSynthesizeBtn() {
            synthesizeBtn.classList.remove('loading');
            synthesizeBtn.disabled = false;
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                pauseAudio();
            } else {
                playAudio();
            }
        });

        function playAudio() {
            const audioEl = document.getElementById("livekit-audio");
            if (audioEl) audioEl.muted = false;
            if (gainNode) gainNode.gain.value = 0.001;
            isPlaying = true;
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            drawVisualizer();
        }

        function pauseAudio() {
            const audioEl = document.getElementById("livekit-audio");
            if (audioEl) audioEl.muted = true;
            if (gainNode) gainNode.gain.value = 0.0;
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            drawFlatLine();
        }

        function stopAudio(reason = 'user_stop') {
            if (currentRoom) {
                try { currentRoom.disconnect(); } catch(e) {}
                currentRoom = null;
            }
            const el = document.getElementById("livekit-audio");
            if (el) el.remove();
            
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            drawFlatLine();

            if (animationId) cancelAnimationFrame(animationId);

            if (reason !== 'completed' && visualizerCard) {
                visualizerCard.classList.remove('active');
            }
            gainNode = null;
            analyser = null;
        }
    </script>
</body>
</html>
